services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/modeljudge || true;
      exit 0;
      "

  ml-service:
    build: ./services/ml-service
    environment:
      SERVICE_TOKEN: dev-ml-service-token-change-me
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: modeljudge
      MINIO_USE_SSL: "false"
      MJS_VERSION: "1.0.0"
      MAX_UPLOAD_ROWS: "100000"
      MAX_FEATURES: "512"
    ports:
      - "8000:8000"
    depends_on:
      - minio
      - minio-init
    networks:
      - default

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/modeljudge
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production-use-long-random-string
      JWT_ACCESS_TTL: 7d
      CORS_ORIGIN: http://localhost:5173
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: modeljudge
      MINIO_USE_SSL: "false"
      ML_SERVICE_URL: http://ml-service:8000
      ML_SERVICE_TOKEN: dev-ml-service-token-change-me
      MAX_UPLOAD_BYTES: "52428800"
    ports:
      - "4000:4000"
    depends_on:
      - mongo
      - redis
      - minio
      - ml-service

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/modeljudge
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: modeljudge
      MINIO_USE_SSL: "false"
      ML_SERVICE_URL: http://ml-service:8000
      ML_SERVICE_TOKEN: dev-ml-service-token-change-me
      TRAIN_CONCURRENCY: "2"
      EXPLAIN_CONCURRENCY: "1"
    depends_on:
      - mongo
      - redis
      - minio
      - ml-service
      - api

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  mongo_data:
  minio_data:

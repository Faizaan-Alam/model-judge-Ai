name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm install
      - run: npm run build -w @modeljudge/shared
      - run: npx tsc -p apps/api/tsconfig.json --noEmit
      - run: npx tsc -p apps/worker/tsconfig.json --noEmit
      - run: npx tsc -p apps/web/tsconfig.json --noEmit
      - run: npm run test -w @modeljudge/shared
      - run: npm run test -w @modeljudge/api
      - run: npm run test -w @modeljudge/worker
      - run: npm run test -w @modeljudge/web

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest httpx
      - run: pytest -q
